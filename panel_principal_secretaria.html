<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel - Acerimallas</title>
  <!-- FIX: Tailwind v2 (link) no soporta clases con corchetes como bg-[var(--x)].
       Se usa el CDN con JIT (script), que sí las compila en el navegador. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-[var(--surface-1)] text-[var(--text-primary)] min-h-screen">

  <!-- BARRA SUPERIOR -->
  <header class="bg-[var(--surface-2)] border-b border-[var(--border)] sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <h1 class="title-font text-3xl font-semibold tracking-tight">Acerimallas</h1>
        <span class="text-sm text-[var(--text-secondary)] font-medium">Panel de Control</span>
      </div>

      <div class="flex items-center gap-3">
        <div class="relative">
          <button onclick="toggleAlerts()" class="relative flex items-center gap-2 px-5 py-3 hover:bg-[var(--surface-1)] rounded-2xl transition" aria-label="Alertas">
            <i class="fa-solid fa-bell text-xl"></i>
            <span id="alertDot" class="absolute top-2 right-3 w-2.5 h-2.5 bg-red-500 rounded-full hidden-el"></span>
            <span class="hidden md:inline">Alertas</span>
          </button>

          <!-- Panel de alertas: anclado justo debajo del ícono de campana -->
          <div id="alertsPanel" class="hidden-el card p-4 absolute right-0 top-full mt-2 z-50" style="width: 320px;">
            <div class="flex justify-between items-center mb-3">
              <p class="font-medium text-sm">Alertas</p>
              <button onclick="limpiarAlertas()" class="text-xs text-[var(--text-secondary)] hover:text-[var(--accent)]">Limpiar avisos</button>
            </div>
            <div id="alertEmailWarning" class="hidden-el rounded-xl p-3 mb-2" style="background:#FEF3C7;">
              <p class="text-xs" style="color:#92400E;">Configura tu correo para recibir las alertas.</p>
            </div>
            <div id="alertsList" class="max-h-64 overflow-y-auto"></div>
          </div>
        </div>

        <button onclick="refreshData()" class="flex items-center gap-2 px-5 py-3 hover:bg-[var(--surface-1)] rounded-2xl transition" aria-label="Actualizar">
          <i class="fa-solid fa-rotate text-xl"></i>
          <span class="hidden md:inline">Actualizar</span>
        </button>

        <button onclick="toggleTheme()" id="themeBtn" class="flex items-center gap-2 px-5 py-3 hover:bg-[var(--surface-1)] rounded-2xl transition" aria-label="Cambiar tema">
          <i id="themeIcon" class="fa-solid fa-moon text-xl"></i>
        </button>

        <a href="configuracion.html" class="flex items-center gap-2 px-5 py-3 hover:bg-[var(--surface-1)] rounded-2xl transition" aria-label="Configuración">
          <i class="fa-solid fa-gear text-xl"></i>
          <span class="hidden md:inline">Configuración</span>
        </a>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-8 py-10">

    <!-- Pestañas: Proveedores / Mantenimientos -->
    <div class="flex gap-2 mb-6" style="border-bottom: 0.5px solid var(--border);">
      <button onclick="cambiarPestana('proveedores')" id="tabProveedores" class="flex items-center gap-2 text-sm px-2 py-2" style="border:none;background:transparent;border-bottom:2px solid var(--accent);color:var(--accent);border-radius:0;">
        <i class="fa-solid fa-store"></i> Proveedores
      </button>
      <button onclick="cambiarPestana('mantenimientos')" id="tabMantenimientos" class="flex items-center gap-2 text-sm px-2 py-2" style="border:none;background:transparent;color:var(--text-secondary);border-radius:0;">
        <i class="fa-solid fa-screwdriver-wrench"></i> Mantenimientos
      </button>
    </div>

    <!-- ===================== VISTA: PROVEEDORES ===================== -->
    <div id="vistaProveedores">

      <!-- Botón Agenda (aparte, oculto por defecto el calendario) -->
      <div class="flex justify-end mb-6">
        <button onclick="toggleAgenda()" class="btn-secondary flex items-center gap-2">
          <i class="fa-solid fa-calendar"></i> Agenda
        </button>
      </div>

      <div id="agendaPanel" class="hidden-el card p-4 mb-6" style="max-width: 300px;"></div>

      <!-- Buscador -->
      <div class="relative mb-4">
        <input type="text" id="searchInput"
               placeholder="Buscar por razón social, RUC, nombre comercial o ciudad..."
               class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-3xl px-6 py-5 pl-14 text-lg focus:outline-none focus:border-[var(--accent)]"
               oninput="searchProviders()">
        <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-[var(--text-secondary)] text-xl"></i>
      </div>

      <!-- Filtros de estado -->
      <div class="flex gap-2 mb-6">
        <button onclick="filtrarPorEstado('todos')" id="filtroTodos" class="text-xs px-3 py-1.5 rounded-full" style="background:var(--surface-2);border:0.5px solid var(--border);color:var(--text-secondary);">Todos</button>
        <button onclick="filtrarPorEstado('verificado')" id="filtroVerificado" class="text-xs px-3 py-1.5 rounded-full" style="background:var(--surface-2);border:0.5px solid var(--border);color:var(--text-secondary);">Verificados</button>
        <button onclick="filtrarPorEstado('no-verificado')" id="filtroNoVerificado" class="text-xs px-3 py-1.5 rounded-full" style="background:var(--surface-2);border:0.5px solid var(--border);color:var(--text-secondary);">No verificados</button>
      </div>

      <!-- Lista de Proveedores -->
      <h2 class="title-font text-2xl font-medium mb-6">Proveedores</h2>

      <div id="providersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      <p id="noResults" class="text-[var(--text-secondary)] mt-6 hidden-el">No se encontraron proveedores con ese criterio de búsqueda.</p>
    </div>

    <!-- ===================== VISTA: MANTENIMIENTOS ===================== -->
    <div id="vistaMantenimientos" class="hidden-el">
      <div class="flex justify-between items-center mb-6">
        <h2 class="title-font text-2xl font-medium">Mantenimientos · todos los equipos</h2>
        <a href="equipos_mantenimiento.html" class="btn-primary flex items-center gap-2 text-sm">
          <i class="fa-solid fa-plus"></i> Gestionar equipos
        </a>
      </div>
      <div id="mantenimientosList" class="card p-2"></div>
    </div>

  </div>

  <script src="js/store.js"></script>
  <script>
    // ---- Tema claro/oscuro ----
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      const icon = document.getElementById('themeIcon');
      if (document.documentElement.classList.contains('dark')) {
        icon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('theme', 'dark');
      } else {
        icon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('theme', 'light');
      }
    }

    if (localStorage.getItem('theme') === 'dark' || localStorage.getItem('theme') === null) {
      document.documentElement.classList.add('dark');
      if (localStorage.getItem('theme') === null) localStorage.setItem('theme', 'dark');
    }
    window.addEventListener('DOMContentLoaded', () => {
      if (document.documentElement.classList.contains('dark')) {
        document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
      }
    });

    // ---- Badge según estado ----
    function badgeFor(estado) {
      if (estado === 'verificado') return `<i class="fa-solid fa-check" style="color:var(--text-success)" title="Verificado"></i>`;
      if (estado === 'no-verificado') return `<i class="fa-solid fa-xmark" style="color:var(--text-danger)" title="No verificado"></i>`;
      return `<span class="status-pendiente">Pendiente</span>`;
    }

    // ---- Render de la lista ----
    function renderProviders(list) {
      const container = document.getElementById('providersList');
      const noResults = document.getElementById('noResults');

      if (list.length === 0) {
        container.innerHTML = '';
        noResults.classList.remove('hidden-el');
        return;
      }
      noResults.classList.add('hidden-el');

      container.innerHTML = list.map(p => `
        <div onclick="openProviderDetail('${p.id}')" class="card p-6 cursor-pointer">
          <div class="flex justify-between gap-3">
            <div>
              <h3 class="font-semibold text-lg">${p.razonSocial}</h3>
              <p class="text-[var(--text-secondary)] text-sm">RUC: ${p.ruc} • ${p.ciudad}</p>
            </div>
            ${badgeFor(p.estado)}
          </div>
        </div>
      `).join('');
    }

    // ---- Búsqueda + filtro de estado (combinados) ----
    let proveedoresCache = [];
    let filtroEstadoActual = 'todos';

    function aplicarFiltrosYBusqueda() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      let resultado = proveedoresCache;

      if (filtroEstadoActual !== 'todos') {
        resultado = resultado.filter(p => p.estado === filtroEstadoActual);
      }

      if (q) {
        resultado = resultado.filter(p =>
          (p.razonSocial || '').toLowerCase().includes(q) ||
          (p.nombreComercial || '').toLowerCase().includes(q) ||
          (p.ruc || '').toLowerCase().includes(q) ||
          (p.ciudad || '').toLowerCase().includes(q)
        );
      }

      renderProviders(resultado);
    }

    function searchProviders() { aplicarFiltrosYBusqueda(); }

    function filtrarPorEstado(estado) {
      filtroEstadoActual = estado;
      ['filtroTodos', 'filtroVerificado', 'filtroNoVerificado'].forEach(id => {
        const btn = document.getElementById(id);
        btn.style.background = 'var(--surface-2)';
        btn.style.color = 'var(--text-secondary)';
        btn.style.border = '0.5px solid var(--border)';
      });
      const mapaBoton = { todos: 'filtroTodos', verificado: 'filtroVerificado', 'no-verificado': 'filtroNoVerificado' };
      const activo = document.getElementById(mapaBoton[estado]);
      activo.style.background = 'var(--accent)';
      activo.style.color = 'white';
      activo.style.border = 'none';

      aplicarFiltrosYBusqueda();
    }

    function openProviderDetail(id) {
      window.location.href = `ficha_proveedor.html?id=${id}`;
    }

    // ---- Agenda: calendario mensual real ----
    let agendaAbierta = false;
    let agendaFecha = new Date(); // mes/año que se está mostrando
    let agendaDiaSeleccionado = null;
    let equiposCacheAgenda = [];

    const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const DIAS_SEMANA = ['Lu','Ma','Mi','Ju','Vi','Sá','Do'];

    function toYMD(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    async function toggleAgenda() {
      agendaAbierta = !agendaAbierta;
      const panel = document.getElementById('agendaPanel');
      panel.classList.toggle('hidden-el', !agendaAbierta);
      if (agendaAbierta) {
        equiposCacheAgenda = await getEquipos(); // todos los equipos, para ver próximos mantenimientos
        renderAgenda();
      }
    }

    function cambiarMesAgenda(delta) {
      agendaFecha = new Date(agendaFecha.getFullYear(), agendaFecha.getMonth() + delta, 1);
      agendaDiaSeleccionado = null;
      renderAgenda();
    }

    function renderAgenda() {
      const panel = document.getElementById('agendaPanel');
      const year = agendaFecha.getFullYear();
      const month = agendaFecha.getMonth();

      const primerDiaSemana = (new Date(year, month, 1).getDay() + 6) % 7; // que la semana empiece en lunes
      const diasEnMes = new Date(year, month + 1, 0).getDate();
      const hoyYMD = toYMD(new Date());

      // Fechas con eventos: mantenimientos próximos (de equipos) y proveedores registrados
      const fechasMantenimiento = new Set(equiposCacheAgenda.map(e => e.proximoMantenimiento).filter(Boolean));
      const fechasRegistro = new Set(proveedoresCache.map(p => (p.fechaRegistro || '').slice(0, 10)).filter(Boolean));

      let celdas = '';
      for (let i = 0; i < primerDiaSemana; i++) celdas += `<div></div>`;
      for (let dia = 1; dia <= diasEnMes; dia++) {
        const fechaYMD = toYMD(new Date(year, month, dia));
        const esHoy = fechaYMD === hoyYMD;
        const esSeleccionado = fechaYMD === agendaDiaSeleccionado;
        const tieneMantenimiento = fechasMantenimiento.has(fechaYMD);
        const tieneRegistro = fechasRegistro.has(fechaYMD);

        celdas += `
          <button onclick="seleccionarDiaAgenda('${fechaYMD}')"
            class="rounded-lg text-xs flex flex-col items-center justify-center gap-0.5 transition"
            style="height:30px; ${esSeleccionado ? 'background:var(--accent);color:white;' : esHoy ? 'border:1.5px solid var(--accent);' : ''}">
            <span>${dia}</span>
            <span class="flex gap-0.5" style="height:4px;">
              ${tieneMantenimiento ? '<span style="width:3px;height:3px;border-radius:50%;background:#D97706;display:inline-block;"></span>' : ''}
              ${tieneRegistro ? '<span style="width:3px;height:3px;border-radius:50%;background:#2B5F52;display:inline-block;"></span>' : ''}
            </span>
          </button>`;
      }

      panel.innerHTML = `
        <div class="flex justify-between items-center mb-3">
          <button onclick="cambiarMesAgenda(-1)" class="w-7 h-7 flex items-center justify-center hover:bg-[var(--surface-1)] rounded-full text-sm"><i class="fa-solid fa-chevron-left"></i></button>
          <p class="title-font font-medium text-sm">${MESES[month]} ${year}</p>
          <button onclick="cambiarMesAgenda(1)" class="w-7 h-7 flex items-center justify-center hover:bg-[var(--surface-1)] rounded-full text-sm"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="grid grid-cols-7 gap-1 mb-1 text-center" style="font-size:10px; color:var(--text-muted);">
          ${DIAS_SEMANA.map(d => `<div>${d}</div>`).join('')}
        </div>
        <div class="grid grid-cols-7 gap-1">${celdas}</div>

        <div id="agendaDetalleDia" class="mt-3 pt-3 border-t border-[var(--border)]">
          <p class="text-xs text-[var(--text-muted)]">Selecciona un día para ver el detalle.</p>
        </div>
      `;

      if (agendaDiaSeleccionado) renderDetalleDiaAgenda();
    }

    function seleccionarDiaAgenda(fechaYMD) {
      agendaDiaSeleccionado = fechaYMD;
      renderAgenda();
    }

    function renderDetalleDiaAgenda() {
      const detalle = document.getElementById('agendaDetalleDia');
      const fecha = agendaDiaSeleccionado;

      const proveedoresDelDia = proveedoresCache.filter(p => (p.fechaRegistro || '').slice(0, 10) === fecha);
      const equiposDelDia = equiposCacheAgenda.filter(e => e.proximoMantenimiento === fecha);

      const [y, m, d] = fecha.split('-');
      const fechaLegible = `${d} de ${MESES[parseInt(m) - 1].toLowerCase()} ${y}`;

      detalle.innerHTML = `
        <p class="text-xs font-medium mb-2">${fechaLegible}</p>

        <p style="font-size:10px;" class="text-[var(--text-secondary)] mb-1">Proveedores registrados</p>
        ${proveedoresDelDia.length === 0
          ? `<p class="text-xs text-[var(--text-muted)] mb-3">Ninguno.</p>`
          : proveedoresDelDia.map(p => `<p class="text-xs mb-1">• ${p.razonSocial}</p>`).join('') + '<div class="mb-3"></div>'
        }

        <p style="font-size:10px;" class="text-[var(--text-secondary)] mb-1">Mantenimientos programados</p>
        ${equiposDelDia.length === 0
          ? `<p class="text-xs text-[var(--text-muted)]">Ninguno.</p>`
          : equiposDelDia.map(e => `<p class="text-xs mb-1">• ${e.nombre} <span class="text-[var(--text-muted)]">(${e.ubicacion})</span></p>`).join('')
        }
      `;
    }

    function renderAlertsPanel() {
      const alertas = getAlertas();
      const correos = getCorreosAlerta();
      document.getElementById('alertEmailWarning').classList.toggle('hidden-el', correos.length > 0);
      document.getElementById('alertDot').classList.toggle('hidden-el', alertas.filter(a => !a.leida).length === 0);

      const list = document.getElementById('alertsList');
      list.innerHTML = alertas.length === 0
        ? `<p class="text-xs text-[var(--text-muted)] py-2">Sin alertas por ahora.</p>`
        : alertas.map(a => `
            <div class="py-2 border-b border-[var(--border)] last:border-0">
              <p class="text-xs">${a.mensaje}</p>
              <p class="text-[10px] text-[var(--text-muted)] mt-1">${new Date(a.fecha).toLocaleString('es-EC')}</p>
            </div>
          `).join('');
    }

    function toggleAlerts() {
      const panel = document.getElementById('alertsPanel');
      panel.classList.toggle('hidden-el');
      if (!panel.classList.contains('hidden-el')) {
        renderAlertsPanel();
        const alertas = getAlertas();
        alertas.forEach(a => a.leida = true);
        saveAlertas(alertas);
        document.getElementById('alertDot').classList.add('hidden-el');
      }
    }

    function limpiarAlertas() {
      saveAlertas([]);
      renderAlertsPanel();
    }

    async function cargarProveedores() {
      document.getElementById('providersList').innerHTML = `<p class="text-sm text-[var(--text-muted)]">Cargando proveedores...</p>`;
      proveedoresCache = await getProveedores();
      aplicarFiltrosYBusqueda();
    }

    async function refreshData() {
      if (pestanaActual === 'proveedores') {
        await cargarProveedores();
      } else {
        await cargarMantenimientos();
      }
      renderAlertsPanel();
    }

    // ---- Pestañas: Proveedores / Mantenimientos ----
    let pestanaActual = 'proveedores';

    async function cambiarPestana(nombre) {
      pestanaActual = nombre;

      const activo = { background: 'transparent', color: 'var(--accent)', borderBottom: '2px solid var(--accent)' };
      const inactivo = { background: 'transparent', color: 'var(--text-secondary)', borderBottom: 'none' };

      const tabP = document.getElementById('tabProveedores');
      const tabM = document.getElementById('tabMantenimientos');
      Object.assign(tabP.style, nombre === 'proveedores' ? activo : inactivo);
      Object.assign(tabM.style, nombre === 'mantenimientos' ? activo : inactivo);

      document.getElementById('vistaProveedores').classList.toggle('hidden-el', nombre !== 'proveedores');
      document.getElementById('vistaMantenimientos').classList.toggle('hidden-el', nombre !== 'mantenimientos');

      if (nombre === 'mantenimientos') {
        await cargarMantenimientos();
      }
    }

    async function cargarMantenimientos() {
      const cont = document.getElementById('mantenimientosList');
      cont.innerHTML = `<p class="text-sm text-[var(--text-muted)] p-4">Cargando mantenimientos...</p>`;

      const [equipos, proveedores] = await Promise.all([getEquipos(), getProveedores()]);
      const proveedorPorId = Object.fromEntries(proveedores.map(p => [String(p.id), p.razonSocial]));

      const equiposConFecha = equipos
        .filter(e => e.proximoMantenimiento)
        .sort((a, b) => new Date(a.proximoMantenimiento) - new Date(b.proximoMantenimiento));

      if (equiposConFecha.length === 0) {
        cont.innerHTML = `<p class="text-sm text-[var(--text-muted)] p-4">No hay mantenimientos programados.</p>`;
        return;
      }

      const hoy = new Date(); hoy.setHours(0,0,0,0);

      cont.innerHTML = equiposConFecha.map((e, i) => {
        const fecha = new Date(e.proximoMantenimiento + 'T00:00:00');
        const vencido = fecha < hoy;
        return `
          <div onclick="window.location.href='equipos_mantenimiento.html'"
               class="flex justify-between items-center p-3 cursor-pointer ${i < equiposConFecha.length - 1 ? 'border-b border-[var(--border)]' : ''}">
            <div>
              <p class="text-sm font-medium">${e.nombre}</p>
              <p class="text-xs text-[var(--text-muted)]">${proveedorPorId[String(e.proveedorId)] || 'Proveedor'} · ${e.ubicacion}</p>
            </div>
            <span class="text-xs px-3 py-1 rounded-full" style="background:${vencido ? 'var(--bg-danger)' : 'var(--bg-warning)'}; color:${vencido ? 'var(--text-danger)' : 'var(--text-warning)'};">
              ${fecha.toLocaleDateString('es-EC', { day: '2-digit', month: 'short' })}
            </span>
          </div>
        `;
      }).join('');
    }

    // Cargar al iniciar
    document.addEventListener('DOMContentLoaded', () => {
      cargarProveedores();
      renderAlertsPanel();
      filtrarPorEstado('todos');
    });
  </script>
</body>
</html>
