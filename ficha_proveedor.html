<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha de Proveedor - Acerimallas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-[var(--surface-1)] text-[var(--text-primary)] min-h-screen py-10">
  <div class="max-w-3xl mx-auto px-6">

    <a href="panel_principal_secretaria.html" class="inline-flex items-center gap-2 mb-6 text-[var(--text-secondary)] hover:text-[var(--accent)]">
      <i class="fa-solid fa-arrow-left"></i> Volver al panel
    </a>

    <div id="fichaContainer" class="card p-8"></div>
  </div>

  <script src="js/store.js"></script>
  <script>
    // Obtiene el id del proveedor desde la URL: ficha_proveedor.html?id=xxxx
    const params = new URLSearchParams(window.location.search);
    const proveedorId = params.get('id');
    let proveedorActual = null;

    // Campos del formulario de 25 preguntas (etiqueta visible + llave en el objeto proveedor)
    const CAMPOS = [
      { key: 'tipoProveedor', label: '2. Tipo de proveedor' },
      { key: 'razonSocial', label: '4. Razón social' },
      { key: 'nombreComercial', label: '5. Nombre comercial' },
      { key: 'ruc', label: '6. RUC' },
      { key: 'archivoRuc', label: '7. RUC actualizado / SRI (PDF)', esArchivo: true },
      { key: 'telefono1', label: '8. Teléfono 1' },
      { key: 'telefono2', label: '9. Teléfono 2' },
      { key: 'ciudad', label: '10. Ciudad' },
      { key: 'provincia', label: '11. Provincia' },
      { key: 'correoRetenciones', label: '12. Correo (retenciones)' },
      { key: 'direccion', label: '13. Dirección' },
      { key: 'representanteLegal', label: '14. Representante legal' },
      { key: 'archivoRepLegal', label: '15. Documento representante legal (PDF)', esArchivo: true },
      { key: 'archivoNombramiento', label: '16. Nombramiento representante (PDF)', esArchivo: true },
      { key: 'contacto1', label: '17. Contacto adicional 1' },
      { key: 'contacto2', label: '18. Contacto adicional 2' },
      { key: 'formaPago', label: '19. Forma de pago' },
      { key: 'entidadBancaria', label: '20. Entidad bancaria' },
      { key: 'tipoCuenta', label: '20. Tipo de cuenta' },
      { key: 'numeroCuenta', label: '20. Número de cuenta' },
      { key: 'titularCuenta', label: '20. Titular de la cuenta' },
      { key: 'certificadoBancario', label: '21. Certificado bancario (PDF)', esArchivo: true },
      { key: 'area', label: '22. Área de servicio' },
    ];

    function badgeFor(estado) {
      if (estado === 'verificado') return `<span class="status-verificado">Verificado</span>`;
      if (estado === 'no-verificado') return `<span class="status-no-verificado">No verificado</span>`;
      return `<span class="status-pendiente">Pendiente</span>`;
    }

    async function render() {
      document.getElementById('fichaContainer').innerHTML = `<p class="text-sm text-[var(--text-muted)]">Cargando ficha...</p>`;
      const proveedores = await getProveedores();
      const p = proveedores.find(x => String(x.id) === String(proveedorId));
      proveedorActual = p;
      const container = document.getElementById('fichaContainer');

      if (!p) {
        container.innerHTML = `<p>Proveedor no encontrado.</p>`;
        return;
      }

      container.innerHTML = `
        <div class="flex justify-between items-start mb-6">
          <div>
            <h1 class="title-font text-2xl font-semibold">${p.razonSocial}</h1>
            <div class="mt-2">${badgeFor(p.estado)}</div>
          </div>
        </div>

        <p class="text-sm text-[var(--text-secondary)] mb-4">Marca la casilla del campo que tenga error</p>

        <div class="border border-[var(--border)] rounded-2xl overflow-hidden mb-8">
          ${CAMPOS.map((c, i) => `
            <div class="flex items-center gap-3 px-4 py-3 ${i < CAMPOS.length - 1 ? 'border-b border-[var(--border)]' : ''}">
              <input type="checkbox" class="w-auto campo-error" data-key="${c.key}" ${p.camposConError.includes(c.key) ? 'checked' : ''}>
              <span class="text-sm text-[var(--text-muted)] w-48 flex-shrink-0">${c.label}</span>
              <span class="text-sm flex-1">
                ${c.esArchivo
                  ? (p[c.key]
                      ? `<a href="${p[c.key]}" target="_blank" class="inline-flex items-center gap-1" style="color:var(--accent);"><i class="fa-solid fa-file-pdf"></i> Ver PDF</a>`
                      : `<span class="text-[var(--text-danger)]">Sin archivo</span>`)
                  : (p[c.key] || '<span class="text-[var(--text-danger)]">(vacío)</span>')
                }
              </span>
            </div>
          `).join('')}
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium mb-2">Observación para el proveedor</label>
          <textarea id="observacionSecretaria" rows="3" placeholder="Ej: Estimado proveedor, hemos revisado sus datos y el 20 no tiene el certificado bancario, vino en blanco. El 15 el PDF de su cédula no se ve claro o falta la papeleta de votación.">${p.observacion || ''}</textarea>
          <p class="text-xs text-[var(--text-muted)] mt-1">Este mensaje se incluye en el correo cuando marcas "No verificado".</p>
        </div>

        <div class="flex gap-4">
          <button onclick="marcarEstado('verificado')" class="flex-1 btn-primary flex items-center justify-center gap-2">
            <i class="fa-solid fa-check"></i> Verificado
          </button>
          <button onclick="marcarEstado('no-verificado')" class="flex-1 btn-danger flex items-center justify-center gap-2">
            <i class="fa-solid fa-xmark"></i> No verificado
          </button>
        </div>
      `;
    }

    async function marcarEstado(nuevoEstado) {
      if (!proveedorActual) return;
      const camposConError = Array.from(document.querySelectorAll('.campo-error:checked')).map(el => el.dataset.key);

      if (nuevoEstado === 'no-verificado' && camposConError.length === 0) {
        alert('Marca al menos un campo con error antes de rechazar la verificación.');
        return;
      }

      if (nuevoEstado === 'no-verificado') {
        const confirma = confirm('¿Está seguro que desea enviar el formulario para que el proveedor lo corrija?');
        if (!confirma) return;
      }

      const botones = document.querySelectorAll('.flex.gap-4 button');
      botones.forEach(b => b.disabled = true);

      const observacion = document.getElementById('observacionSecretaria').value.trim();
      const resultado = await actualizarEstadoProveedor(proveedorActual.id, nuevoEstado, camposConError, observacion);

      if (!resultado.ok) {
        alert('Ocurrió un error al actualizar. Intenta de nuevo.');
        botones.forEach(b => b.disabled = false);
        return;
      }

      alert(nuevoEstado === 'no-verificado'
        ? 'Formulario reenviado al proveedor.'
        : 'Guardado. Se envió el correo al proveedor confirmando que quedó verificado.');

      render();
    }

    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
